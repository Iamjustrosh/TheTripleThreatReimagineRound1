<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="./favicon_io/favicon.ico" type="image/x-icon">
    <title>Ford® - New Hybrid &amp; Electric Vehicles, SUVs, Crossovers, Trucks, Vans &amp; Cars</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css">
</head>

<body style="user-select: none;" theme="black">


    <div id="cursor"
        class="hidden w-4 h-4 font-medium rounded-full lg:flex justify-center text-center leading-none  items-center bg-[#ffffff93] z-[3] text-[0.15rem] overflow-hidden fixed pointer-events-none ">
    </div>

    <div class="splashScreen flex justify-center items-center bg-black w-screen h-screen z-50 fixed text-white">
        <h1
            class="splLoad min font-thin md:font-thin lg:font-normal   text-[10rem] absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 text-transparent uppercase text-white ">
        </h1>
        <span id="copyright" class="text-lg self-end relative opacity-50 bottom-28">By - The Triple Threat</span>
    </div>
    <div id="main" class="wrapper w-screen h-screen overflow-x-hidden relative">
        <div class="navbar sticky top-0 left-0 gap-2 flex justify-between items-center h-20 w-full bg-red text-lg text-white z-10">
            <div class="left w-14">
                <a href="#heroSection"><img src="./assets/Ford .png" alt=""></a>
            </div>
            <div
                class="center hidden md:static absolute bg-black md:min-h-fit min-h-[60vh] left-0 top[-100%] md:w-auto w-full items-center  px-5 ">
                <ul class="flex md:flex-row flex-col md:items-center md:gap-[4vw] gap-8">
                    <li><a href="">Vehicles</a> </li>
                    <li><a href="">Shop</a> </li>
                    <li><a href="">Support & Services</a> </li>
                    <li><a href="">Help</a> </li>
                </ul>

            </div>
            <div class="right right-0 flex md:flex-row md:items-center md:gap-[4vw]">
                <i class="ri-user-fill "></i>
                <div class="selectBox">
                    <a href="#">
                        <i class="ri-global-fill"></i>
                    </a>
                </div>

                <div class="searchBox">
                    <input type="text" placeholder="Search Your Vehicle">
                    <a href="#">
                        <i class="searchbtn ri-search-line"></i>
                    </a>
                </div>
            </div>
            <div class="">
                <!-- <i onclick="onToggleMenu(this)" name="menu" class="fa-solid fa-bars ms:hidden" style="color: #ffffff;"></i> -->
                <!-- <i for="check" class="checkbtn fa-solid fa-bars" style="color: #ffffff;"></i> -->
            </div>

        </div>

        <div id="herosection" class="heroSection relative flex">
            <div class="heroBg blur-lg w-screen h-screen absolute">
                <img id="img" class=" sm:opacity-100 w-full h-full object-cover " src="./images/bg2.png" alt="">
            </div>
            <div class="heroCar absolute w-fit h-full">
                <div
                    class="relative scale-90 sm:scale-100 z-[2] left-1/2 -translate-x-1/2 top-2/3 -translate-y-1/2 sm:translate-y-0 min-w-96 w-[45%] sm:left-1/2 sm:top-[40%]">
                    <!-- <div class="overlay z-[4] bg-[#fa8a8ac9] absolute w-full h-full "></div>   It is solved by giving cursor pointer-event-none  -->
                    <a href="#categories"><img id="car" class="" src="./images/heroCar.png " alt=""></a>
                </div>
            </div>

            <h1
                class="heroTxt absolute flex justify-center top-60 uppercase text-[0px] lg:text-[10rem]  xl:text-[16rem] 2xl:text-[19rem] w-full h-full z-[1]">
            </h1>
            <div
                class="absolute flex justify-center top-2/3 -translate-y-1/2 uppercase text-[6rem] lg:hidden w-full h-full">
                <h1 class="smlHero leading-none tracking-tighter">
                    <span class="font-light">Build</span> <br> <span class="font-semibold">Ford </span> <br> <span
                        class="font-bold"> Tough </span>
                </h1>
            </div>

            <div title="Scroll Down" class="scrlDwn w-screen h-screen flex ">
                <div class="scrollDown absolute left-1/2 -translate-x-1/2 bottom-[5rem] sm:bottom-10 w-24 h-24 ">
                    <script src="https://unpkg.com/@dotlottie/player-component@latest/dist/dotlottie-player.mjs"
                        type="module"></script>
                    <dotlottie-player src="https://lottie.host/843d6dd5-c7b3-41cf-8e7f-97cc4ccae5d0/YCrOp0GNjk.json"
                        background="transparent" speed="1" loop autoplay></dotlottie-player></iframe>
                </div>
            </div>
        </div>


        <div id="categories" class="categorySection w-full lg:h-screen flex justify-center items-center text-center flex-col flex-1 ">
            <div class="categoriesHeading text-3xl font-bold lg:text-8xl">
                <h1 class="uppercase">choose your drive</h1>
            </div>
            <div class="category text-2xl lg:text-3xl mt-10 py-10 flex flex-wrap flex-col lg:flex-row flex-shrink-0 gap-10 px-10">
                <div class="categoryCard font-bold w-[18rem] h-[13rem] lg:w-[30rem] lg:h-[22rem] relative rounded-xl overflow-hidden  ">
                    <div class="overlay2 w-full h-full bg-gradient-to-r from-black -left-[22%] absolute z-[5]"></div>
                    <div class="cardImg relative scale-[1.2] w-full h-full">
                        <img class="absolute h-full " src="./images/image car.png" alt="Mustang">
                    </div>
                    <div class="cardTitle flex gap-3 absolute top-4 left-4 lg:left-[2rem] z-[4]">
                        <h2 class="uppercase ">cars</h2>
                        <i class="ri-arrow-right-circle-line"></i>
                    </div>
                </div>
                <div class="categoryCard font-bold w-[18rem] h-[13rem] lg:w-[30rem] lg:h-[22rem] relative rounded-xl overflow-hidden ">
                    <div class="overlay2 w-full h-full bg-gradient-to-r from-black -left-[22%] absolute z-[5]"></div>
                    <div class="cardImg relative scale-[1.2] w-full h-full">
                        <img class="absolute h-full object-cover " style="object-position: 1rem 0.5rem;"
                            src="./images/image suv.png" alt="Bronco">
                    </div>
                    <div class="cardTitle flex gap-3 absolute top-4 left-4 lg:left-[2rem] z-[4]">
                        <h2 class="uppercase ">SUVS</h2>
                        <i class="ri-arrow-right-circle-line"></i>
                    </div>
                </div>
                <div class="categoryCard font-bold w-[18rem] h-[13rem] lg:w-[30rem] lg:h-[22rem] relative rounded-xl  overflow-hidden ">
                    <div class="overlay2 w-full h-full bg-gradient-to-r from-black -left-[22%] absolute z-[5]"></div>
                    <div class="cardImg relative scale-[1]  w-full h-full">
                        <img class="absolute h-full object-cover object-left" style="object-position: -1.8rem 0rem;" src="./images/image truck.png" alt="Mustang">
                    </div>
                    <div class="cardTitle flex gap-3 absolute top-4 left-4 lg:left-[2rem] z-[4]">
                        <h2 class="uppercase ">Trucks</h2>
                        <i class="ri-arrow-right-circle-line"></i>
                    </div>
                </div>

            </div>
            <div class="categoriesCTA text-lg mt-2 mb-5 bg-transparent px-4 py-2 font-medium uppercase rounded-full lg:text-3xl lg:font-normal lg:px-6 lg:py-4
            overflow-hidden
            relative border-2 border-gray-800  text-white transition-colors before:absolute before:rounded-full before:left-0 before:top-0 before:-z-10 before:h-full before:w-full before:origin-top-left before:scale-x-0 before:bg-white before:transition-transform before:duration-500 before:content-[''] hover:text-black before:hover:scale-x-100">
                <h3>Explore More</h3>
            </div>
        </div>



    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="script.js"></script>

</body>

</html>
