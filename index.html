<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="./favicon_io/favicon.ico" type="image/x-icon">
    <title>Ford | TheTripleThreat | Reimagine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css">
</head>

<body theme="black">


    <div class="splashScreen flex justify-center items-center bg-black w-screen h-screen z-10 fixed text-white">
        <h1 class="min text-[10em] absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 text-transparent uppercase text-white "></h1>
        <span id="copyright" class="text-lg self-end relative opacity-50 bottom-28">By - The Triple Threat</span>
    </div>
    <div class="wrapper w-screen h-screen overflow-x-hidden">
        <div class="navbar gap-5 flex justify-center items-center h-20 w-full bg-red-500 text-lg text-white">
            <i class="ri-user-fill"></i>
            <i class="ri-global-fill"></i>
            <i class="ri-search-line"></i>
        </div>
        <div class="heroSection relative flex">
            <div class="heroBg w-screen h-screen absolute">
                <img id="img" class="w-full h-full object-cover " src="./images/bg.png" alt="">
            </div>
            <div class="heroCar absolute w-fit h-full">
                <img id="car" class="min-w-96 w-[45%] relative left-1/2 top-[40%]" src="./images/heroCar.png" alt="">
            </div>
            <div class="callToAction"></div>
            <div class="scrDw w-screen h-screen flex" >
            <div class="scrollDown absolute left-1/2 -translate-x-1/2 bottom-20 w-24 h-24 ">
                <script src="https://unpkg.com/@dotlottie/player-component@latest/dist/dotlottie-player.mjs"
                    type="module"></script>
                <dotlottie-player src="https://lottie.host/843d6dd5-c7b3-41cf-8e7f-97cc4ccae5d0/YCrOp0GNjk.json"
                    background="transparent" speed="1"  loop
                    autoplay></dotlottie-player></iframe>
                </div>  
            </div>  
        </div>

        <div class="powerSection w-full h-[600px]">
        </div>
    </div>





    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
